name: foxNumber
options:
  bundleIdPrefix: com.foxlab
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  foxNumber:
    type: application
    platform: iOS
    sources:
      - path: Sources/foxNumber
    settings:
      base:
        INFOPLIST_FILE: Sources/foxNumber/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.foxlab.foxNumber
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/foxNumber/Resources/Info.plist
      properties:
        CFBundleName: foxNumber
        CFBundleDisplayName: foxNumber
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationIsSceneConfigurationBased: false

  foxNumberWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Sources/foxNumberWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.foxlab.foxNumber.widget
        INFOPLIST_FILE: Sources/foxNumberWidget/Info.plist
    info:
      path: Sources/foxNumberWidget/Info.plist
      properties:
        CFBundleName: foxNumberWidget
        CFBundleDisplayName: foxNumber Widget
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
